<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NetDocIT — Network Inventory</title>
<style>
:root {
  --bg: #0d1117;
  --panel: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --dim: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --yellow: #d29922;
  --red: #f85149;
  --magenta: #bc8cff;
}
* { box-sizing: border-box; margin: 0; padding: 0 }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px; line-height: 1.5;
  min-height: 100vh;
}
header {
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 10;
}
header h1 { font-size: 18px; font-weight: 600; color: var(--accent) }
header .status { font-size: 12px; padding: 3px 10px; border-radius: 12px; font-weight: 600 }
.status.idle { background: #1b2a1b; color: var(--green) }
.status.scanning { background: #2a2410; color: var(--yellow); animation: pulse 1.5s infinite }
.status.completed { background: #1b2a1b; color: var(--green) }
.status.error { background: #2a1010; color: var(--red) }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.5 } }
main { max-width: 1400px; margin: 0 auto; padding: 20px 24px }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px }
.card .num { font-size: 28px; font-weight: 700; color: var(--accent) }
.card .label { font-size: 12px; color: var(--dim); margin-top: 4px }
.bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px }
.bar input, .bar select, .bar button {
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 7px 14px; font-size: 13px; outline: none;
}
.bar input:focus { border-color: var(--accent) }
.bar button {
  cursor: pointer; font-weight: 600; transition: background .15s;
}
.bar button:hover { background: #1f2937 }
.bar button.primary { background: #1c4587; border-color: var(--accent); color: #fff }
.bar button.primary:hover { background: #234890 }
.bar button.export { background: var(--panel) }
.progress-bar {
  flex: 1; min-width: 200px; height: 8px; background: var(--border); border-radius: 4px;
  overflow: hidden;
}
.progress-bar .fill {
  height: 100%; background: var(--accent); border-radius: 4px;
  transition: width .3s; width: 0%;
}
table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 8px; overflow: hidden }
th, td { padding: 8px 14px; text-align: left; white-space: nowrap }
th { background: #1c2128; font-weight: 600; font-size: 12px; color: var(--dim); text-transform: uppercase;
  cursor: pointer; user-select: none; position: sticky; top: 54px }
th:hover { color: var(--text) }
th .sort-arrow { margin-left: 4px; opacity: 0.4 }
th .sort-arrow.active { opacity: 1; color: var(--accent) }
tr { border-bottom: 1px solid var(--border) }
tr:hover { background: #1c2128 }
td.ip { font-family: 'Cascadia Code', 'Fira Code', monospace; color: var(--accent); cursor: pointer }
td.ip:hover { text-decoration: underline }
td.mac { font-family: monospace; font-size: 12px; color: var(--dim) }
td.actions button {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--dim); padding: 2px 8px; font-size: 11px; cursor: pointer; margin-right: 2px
}
td.actions button:hover { color: var(--text); border-color: var(--accent) }
.empty { text-align: center; padding: 60px 20px; color: var(--dim) }
.empty p { font-size: 16px }
.scan-phase { font-size: 12px; color: var(--dim) }
</style>
</head>
<body>

<header>
  <h1>NetDocIT</h1>
  <span id="status" class="status idle">IDLE</span>
  <span style="flex:1"></span>
  <span id="clock" style="color:var(--dim);font-size:12px"></span>
</header>

<main>
  <div class="cards">
    <div class="card"><div class="num" id="card-total">—</div><div class="label">Devices</div></div>
    <div class="card"><div class="num" id="card-windows">—</div><div class="label">Windows</div></div>
    <div class="card"><div class="num" id="card-appliances">—</div><div class="label">Appliances</div></div>
    <div class="card"><div class="num" id="card-subnets">—</div><div class="label">Subnets</div></div>
  </div>

  <div class="bar">
    <button class="primary" id="btn-scan" onclick="startScan()">Scan Network</button>
    <select id="profile-select">
      <option value="safe">Safe</option>
      <option value="balanced" selected>Balanced</option>
      <option value="aggressive">Aggressive</option>
    </select>
    <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
    <span id="scan-phase" class="scan-phase"></span>
    <input type="text" id="search" placeholder="Search IP / hostname / vendor..." oninput="renderTable()">
    <button class="export" onclick="window.open('/api/export/csv')" title="Download CSV">CSV</button>
    <button class="export" onclick="window.open('/api/export/json')" title="Download JSON">JSON</button>
  </div>

  <table id="dev-table">
    <thead>
      <tr>
        <th onclick="sortTable('ip')">IP <span class="sort-arrow">&#9650;</span></th>
        <th onclick="sortTable('mac')">MAC</th>
        <th onclick="sortTable('hostname')">Hostname</th>
        <th onclick="sortTable('os')">OS <span class="sort-arrow">&#9650;</span></th>
        <th onclick="sortTable('vendor')">Vendor</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="dev-body"></tbody>
  </table>
  <div id="empty-msg" class="empty"><p>No devices found. Run a scan to discover your network.</p></div>
</main>

<script>
let devices = [], liveDevices = [], sortCol = 'ip', sortAsc = true;

function $(id) { return document.getElementById(id) }

async function fetchJSON(url) {
  const r = await fetch(url);
  return r.json();
}

async function loadDevices() {
  try {
    const data = await fetchJSON('/api/devices');
    devices = data.devices || [];
    liveDevices = data.live || [];
    renderTable();
  } catch(e) {}
}

async function loadSummary() {
  try {
    const s = await fetchJSON('/api/summary');
    $('card-total').textContent = s.total_devices || 0;
    $('card-windows').textContent = s.windows_count || 0;
    $('card-appliances').textContent = s.appliance_count || 0;
    $('card-subnets').textContent = s.subnet_count || 0;
  } catch(e) {}
}

let scanPoll = null;
async function pollScan() {
  try {
    const s = await fetchJSON('/api/scan/status');
    $('scan-phase').textContent = s.phase || '';
    const status = $('status');
    const fill = $('progress-fill');
    if (s.running) {
      status.textContent = 'SCANNING'; status.className = 'status scanning';
      fill.style.width = s.phase === 'completed' ? '100%' : '60%';
    } else if (s.phase === 'completed') {
      status.textContent = 'DONE'; status.className = 'status completed';
      fill.style.width = '100%';
      $('btn-scan').disabled = false;
      clearInterval(scanPoll); scanPoll = null;
      loadDevices(); loadSummary();
      setTimeout(() => { status.textContent = 'IDLE'; status.className = 'status idle'; fill.style.width = '0%'; $('scan-phase').textContent = '' }, 3000);
    } else if (s.phase === 'error') {
      status.textContent = 'ERROR'; status.className = 'status error';
      fill.style.width = '0%';
      $('scan-phase').textContent = s.error || 'error';
      $('btn-scan').disabled = false;
      clearInterval(scanPoll); scanPoll = null;
    }
  } catch(e) {}
}

async function startScan() {
  const profile = $('profile-select').value;
  $('btn-scan').disabled = true;
  $('status').textContent = 'SCANNING'; $('status').className = 'status scanning';
  $('progress-fill').style.width = '5%';
  try {
    await fetch('/api/scan/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({profile})
    });
    scanPoll = setInterval(pollScan, 800);
  } catch(e) {
    $('btn-scan').disabled = false;
  }
}

function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true }
  renderTable();
}

function renderTable() {
  const query = ($('search').value || '').toLowerCase();
  let rows = [...devices];
  if (query) rows = rows.filter(d =>
    (d.ip||'').includes(query) || (d.hostname||'').toLowerCase().includes(query) ||
    (d.mac||'').toLowerCase().includes(query) || (d.vendor||'').toLowerCase().includes(query) ||
    (d.os||'').toLowerCase().includes(query)
  );
  rows.sort((a,b) => {
    const va = a[sortCol] || '', vb = b[sortCol] || '';
    if (sortCol === 'ip') {
      const pa = va.split('.'), pb = vb.split('.');
      for (let i=0;i<4;i++) { const diff = (pa[i]|0)-(pb[i]|0); if (diff) return diff }
      return 0;
    }
    return String(va).localeCompare(String(vb));
  });
  if (!sortAsc) rows.reverse();

  const tbody = $('dev-body');
  tbody.innerHTML = rows.map(d => `
    <tr>
      <td class="ip" onclick="copyIP('${d.ip}')" title="Click to copy">${d.ip||'—'}</td>
      <td class="mac">${d.mac||'—'}</td>
      <td>${d.hostname||'—'}</td>
      <td>${d.os||'Unknown'}</td>
      <td>${d.vendor||'Unknown'}</td>
      <td class="actions">
        <button onclick="rdpTo('${d.ip}')" title="Remote Desktop">RDP</button>
        <button onclick="httpTo('${d.ip}')" title="Open in browser">HTTP</button>
        <button onclick="httpsTo('${d.ip}')" title="Open HTTPS">HTTPS</button>
      </td>
    </tr>
  `).join('');

  $('empty-msg').style.display = rows.length ? 'none' : 'block';
  document.querySelectorAll('.sort-arrow').forEach(a => { a.classList.remove('active'); a.textContent = '\u25B4' });
  const arrows = document.querySelectorAll('th .sort-arrow');
  [].forEach.call(arrows, (a,i) => {
    const cols = ['ip','mac','hostname','os','vendor'];
    if (cols[i] === sortCol) { a.classList.add('active'); a.textContent = sortAsc ? '\u25B2' : '\u25BC' }
  });
}

function copyIP(ip) {
  navigator.clipboard.writeText(ip).then(() => {}).catch(() => {});
}

function rdpTo(ip) {
  window.open('rdp://full+address=' + ip, '_blank');
  const a = document.createElement('a');
  a.href = 'data:text/plain,Start-Process mstsc -ArgumentList "/v:' + ip + '"';
  a.download = 'rdp-launch.ps1';
  a.click();
}

function httpTo(ip) { window.open('http://'+ip, '_blank') }
function httpsTo(ip) { window.open('https://'+ip, '_blank') }

setInterval(() => { $('clock').textContent = new Date().toLocaleTimeString() }, 1000);
loadDevices();
loadSummary();
</script>

</body>
</html>
